<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEBULA CDN - Game Library | GoatTech Industries</title>
<meta name="description" content="Browse and play 2790+ browser games instantly. Powered by NEBULA CDN from GoatTech Industries.">
<meta name="author" content="GoatTech Industries">
<meta property="og:title" content="NEBULA CDN - Game Library">
<meta property="og:description" content="Browse and play 2790+ browser games instantly. No downloads required.">
<meta property="og:type" content="website">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a28;--surface3:#222236;
--border:#2a2a42;--text:#e4e4f0;--text2:#8888aa;--accent:#7c5cfc;
--accent2:#5c3cdc;--accent-glow:rgba(124,92,252,0.15);--green:#2ecc71;
--red:#e74c3c;--orange:#f39c12;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
button{cursor:pointer;font-family:inherit}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);background:rgba(18,18,26,0.92)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:0.75rem;font-size:1.5rem;font-weight:800;color:#fff;letter-spacing:-0.5px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#a78bfa);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.logo span{background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-stats{display:flex;gap:1rem;margin-left:auto}
.stat{background:var(--surface2);padding:0.4rem 0.8rem;border-radius:8px;font-size:0.8rem;color:var(--text2);border:1px solid var(--border)}
.stat b{color:var(--accent);font-weight:700}

/* Search Bar */
.search-section{max-width:1400px;margin:1.5rem auto;padding:0 2rem}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:1rem;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--text2);pointer-events:none}
#search{width:100%;padding:0.9rem 1rem 0.9rem 2.8rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;transition:border-color 0.2s,box-shadow 0.2s;outline:none}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
#search::placeholder{color:var(--text2)}
.search-hint{display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem;font-size:0.8rem;color:var(--text2)}
.kbd{background:var(--surface2);border:1px solid var(--border);padding:0.1rem 0.4rem;border-radius:4px;font-family:monospace;font-size:0.75rem}

/* Category Filter */
.categories{max-width:1400px;margin:0 auto 1rem;padding:0 2rem;display:flex;gap:0.5rem;flex-wrap:wrap}
.cat-btn{padding:0.4rem 0.9rem;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:0.82rem;transition:all 0.2s;white-space:nowrap}
.cat-btn:hover{border-color:var(--accent);color:var(--text)}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.cat-btn .count{opacity:0.6;font-size:0.75rem;margin-left:0.2rem}

/* Sort/View Controls */
.controls{max-width:1400px;margin:0 auto 1rem;padding:0 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem}
.results-count{font-size:0.9rem;color:var(--text2)}
.results-count b{color:var(--text)}
.view-controls{display:flex;gap:0.5rem;align-items:center}
.sort-select{padding:0.4rem 0.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.82rem;outline:none}
.sort-select:focus{border-color:var(--accent)}
.view-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);transition:all 0.2s}
.view-btn:hover,.view-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Game Grid */
.grid{max-width:1400px;margin:0 auto;padding:0 2rem 3rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.grid.list-view{grid-template-columns:1fr}
.grid.list-view .card{flex-direction:row;gap:1rem}
.grid.list-view .card-body{flex:1}
.grid.list-view .card-img{width:80px;min-height:60px;border-radius:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.25s;display:flex;flex-direction:column;cursor:pointer;position:relative}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow),0 0 20px var(--accent-glow)}
.card-img{height:48px;background:linear-gradient(135deg,var(--surface2),var(--surface3));display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--text2);position:relative;overflow:hidden}
.card-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.3))}
.card-body{padding:0.9rem;flex:1;display:flex;flex-direction:column;gap:0.4rem}
.card-title{font-size:0.95rem;font-weight:600;color:#fff;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-cat{font-size:0.75rem;color:var(--accent);font-weight:500}
.card-desc{font-size:0.78rem;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:auto;padding-top:0.4rem}
.card-tag{font-size:0.65rem;padding:0.15rem 0.4rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text2)}
.card-footer{display:flex;gap:0.5rem;padding:0 0.9rem 0.9rem}
.btn{padding:0.45rem 0.8rem;border-radius:8px;font-size:0.8rem;font-weight:600;border:none;transition:all 0.2s;flex:1;text-align:center}
.btn-play{background:var(--accent);color:#fff}.btn-play:hover{background:var(--accent2)}
.btn-blank{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-blank:hover{border-color:var(--accent);color:var(--accent)}
.btn-size{font-size:0.7rem;color:var(--text2);padding:0.45rem 0.5rem;display:flex;align-items:center}

/* Game Player Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;backdrop-filter:blur(4px);animation:fadeIn 0.2s}
.modal-overlay.active{display:flex;align-items:center;justify-content:center}
.modal{width:95vw;height:92vh;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 64px rgba(0,0,0,0.6)}
.modal-header{display:flex;align-items:center;padding:0.75rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);gap:0.75rem;min-height:48px}
.modal-title{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-actions{display:flex;gap:0.5rem}
.modal-btn{padding:0.4rem 0.7rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:0.8rem;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem}
.modal-btn:hover{border-color:var(--accent);color:var(--text)}
.modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--red);border:none;border-radius:6px;color:#fff;font-size:1.2rem;font-weight:700}
.modal-close:hover{background:#c0392b}
.modal iframe{flex:1;border:none;background:#000;width:100%}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Empty State */
.empty{text-align:center;padding:4rem 2rem;color:var(--text2)}
.empty-icon{font-size:3rem;margin-bottom:1rem}
.empty h3{color:var(--text);margin-bottom:0.5rem}

/* Footer */
.footer{text-align:center;padding:2rem;color:var(--text2);font-size:0.8rem;border-top:1px solid var(--border);margin-top:2rem}
.footer a{color:var(--accent)}

/* Responsive */
@media(max-width:768px){
.header-inner{flex-direction:column;align-items:stretch;gap:0.75rem}
.header-stats{margin-left:0;justify-content:center}
.grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.search-section,.categories,.controls{padding:0 1rem}
.grid{padding:0 1rem 3rem}
}
@media(max-width:480px){
.grid{grid-template-columns:1fr}
.modal{width:100vw;height:100vh;border-radius:0}
}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Back to top */
.back-top{position:fixed;bottom:2rem;right:2rem;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.2rem;box-shadow:var(--shadow);transition:all 0.3s;opacity:0;pointer-events:none;z-index:50;display:flex;align-items:center;justify-content:center}
.back-top.visible{opacity:1;pointer-events:auto}
.back-top:hover{background:var(--accent2);transform:scale(1.1)}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
<div class="header-inner">
<div class="logo">
<div class="logo-icon">&#9733;</div>
<span>NEBULA CDN</span>
</div>
<div class="header-stats">
<div class="stat"><b id="total-count">...</b> Games</div>
<div class="stat"><b id="total-size">...</b></div>
<div class="stat"><b id="cat-count">...</b> Categories</div>
</div>
</div>
</header>

<!-- Search -->
<section class="search-section">
<div class="search-wrap">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
<input type="text" id="search" placeholder="Search 2790+ games... (e.g. Mario, Doom, Pokemon)" autocomplete="off" spellcheck="false">
</div>
<div class="search-hint">
<span class="kbd">/</span> to focus &nbsp;|&nbsp; <span class="kbd">Esc</span> to close player &nbsp;|&nbsp; Search by name, category, or tag
</div>
</section>

<!-- Categories -->
<div class="categories" id="categories"></div>

<!-- Controls -->
<div class="controls">
<div class="results-count" id="results-count"></div>
<div class="view-controls">
<select class="sort-select" id="sort-select">
<option value="name-asc">Name A-Z</option>
<option value="name-desc">Name Z-A</option>
<option value="size-desc">Largest First</option>
<option value="size-asc">Smallest First</option>
<option value="category">By Category</option>
</select>
<button class="view-btn active" id="grid-view-btn" title="Grid view" onclick="setView('grid')">&#9638;</button>
<button class="view-btn" id="list-view-btn" title="List view" onclick="setView('list')">&#9776;</button>
</div>
</div>

<!-- Game Grid -->
<div class="grid" id="game-grid"></div>

<!-- Empty State -->
<div class="empty" id="empty-state" style="display:none">
<div class="empty-icon">&#128270;</div>
<h3>No games found</h3>
<p>Try a different search term or category.</p>
</div>

<!-- Game Player Modal -->
<div class="modal-overlay" id="modal">
<div class="modal">
<div class="modal-header">
<div class="modal-title" id="modal-title">Loading...</div>
<div class="modal-actions">
<button class="modal-btn" id="btn-about-blank" title="Open in about:blank (stealth mode)">
&#128279; Stealth Tab
</button>
<button class="modal-btn" id="btn-fullscreen" title="Fullscreen">
&#x26F6; Fullscreen
</button>
<button class="modal-btn" id="btn-new-tab" title="Open in new tab">
&#8599; New Tab
</button>
</div>
<button class="modal-close" id="modal-close">&times;</button>
</div>
<iframe id="game-frame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-pointer-lock" allowfullscreen></iframe>
</div>
</div>

<!-- Back to top -->
<button class="back-top" id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>

<!-- Footer -->
<footer class="footer">
<p><strong>NEBULA CDN</strong> by <a href="https://github.com/GoatTech-42" target="_blank">GoatTech Industries</a></p>
<p style="margin-top:0.3rem">Served via <a href="https://www.jsdelivr.com/" target="_blank">jsDelivr</a> &bull; 
<a href="https://github.com/GoatTech-42/NEBULA-CDN" target="_blank">GitHub</a> &bull;
<a href="https://cdn.jsdelivr.net/gh/GoatTech-42/NEBULA-CDN@main/games.json" target="_blank">API (games.json)</a></p>
</footer>

<script>
(function(){
'use strict';

const CDN_BASE = 'https://cdn.jsdelivr.net/gh/GoatTech-42/NEBULA-CDN@main';
const CATALOG_URL = CDN_BASE + '/games.json';

// Category emoji map
const CAT_ICONS = {
  'Minecraft':'&#9935;','Sonic':'&#9889;','Mario':'&#127812;','Pokemon':'&#9889;',
  'Zelda':'&#128737;','Fighting':'&#129354;','Shooter':'&#127919;','Racing':'&#127950;',
  'Sports':'&#9917;','Platformer':'&#127939;','Puzzle':'&#129513;','RPG':'&#9876;',
  'Strategy':'&#9813;','Horror':'&#128123;','Simulation':'&#127959;','Other':'&#127918;'
};

let allGames = [];
let filtered = [];
let currentCategory = 'All';
let currentView = 'grid';
let currentGame = null;
const PAGE_SIZE = 60;
let displayedCount = 0;

// ─── Fetch catalog ───
async function init() {
  try {
    // Try fetching from jsDelivr first, fallback to local
    let data;
    try {
      const res = await fetch(CATALOG_URL);
      if (!res.ok) throw new Error('CDN fetch failed');
      data = await res.json();
    } catch {
      const res = await fetch('games.json');
      data = await res.json();
    }
    
    allGames = data.games || [];
    document.getElementById('total-count').textContent = data.stats.totalGames.toLocaleString();
    document.getElementById('total-size').textContent = data.stats.totalSizeMB + ' MB';
    document.getElementById('cat-count').textContent = data.categories.length;
    
    buildCategories(data.stats.categories, data.categories);
    filtered = [...allGames];
    displayedCount = 0;
    renderGames();
  } catch (err) {
    document.getElementById('game-grid').innerHTML = '<div class="empty"><div class="empty-icon">&#9888;</div><h3>Failed to load catalog</h3><p>' + err.message + '</p></div>';
  }
}

// ─── Build category buttons ───
function buildCategories(counts, cats) {
  const container = document.getElementById('categories');
  const total = Object.values(counts).reduce((a, b) => a + b, 0);
  let html = `<button class="cat-btn active" onclick="filterCategory('All')">All <span class="count">${total}</span></button>`;
  // Sort categories by count descending
  const sorted = cats.sort((a, b) => (counts[b] || 0) - (counts[a] || 0));
  for (const cat of sorted) {
    const icon = CAT_ICONS[cat] || '&#127918;';
    html += `<button class="cat-btn" data-cat="${cat}" onclick="filterCategory('${cat}')">${icon} ${cat} <span class="count">${counts[cat] || 0}</span></button>`;
  }
  container.innerHTML = html;
}

// ─── Filter by category ───
window.filterCategory = function(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(cat) || (cat === 'All' && b.textContent.startsWith('All')));
  });
  applyFilters();
};

// ─── Search and filter ───
function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  
  filtered = allGames.filter(g => {
    // Category filter
    if (currentCategory !== 'All' && g.category !== currentCategory) return false;
    // Search filter
    if (query) {
      const searchable = (g.name + ' ' + g.category + ' ' + g.slug + ' ' + (g.tags || []).join(' ')).toLowerCase();
      // Support multi-word search
      const words = query.split(/\s+/);
      return words.every(w => searchable.includes(w));
    }
    return true;
  });
  
  applySorting();
  displayedCount = 0;
  renderGames();
}

// ─── Sort games ───
function applySorting() {
  const sort = document.getElementById('sort-select').value;
  switch (sort) {
    case 'name-asc': filtered.sort((a, b) => a.name.localeCompare(b.name)); break;
    case 'name-desc': filtered.sort((a, b) => b.name.localeCompare(a.name)); break;
    case 'size-desc': filtered.sort((a, b) => b.size - a.size); break;
    case 'size-asc': filtered.sort((a, b) => a.size - b.size); break;
    case 'category': filtered.sort((a, b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name)); break;
  }
}

// ─── Render games (virtual scroll / lazy load) ───
function renderGames() {
  const grid = document.getElementById('game-grid');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('results-count');
  
  count.innerHTML = `Showing <b>${Math.min(displayedCount + PAGE_SIZE, filtered.length)}</b> of <b>${filtered.length}</b> games`;
  
  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  if (displayedCount === 0) grid.innerHTML = '';
  
  const end = Math.min(displayedCount + PAGE_SIZE, filtered.length);
  const fragment = document.createDocumentFragment();
  
  for (let i = displayedCount; i < end; i++) {
    const g = filtered[i];
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.slug = g.slug;
    const sizeStr = g.size > 1048576 ? (g.size / 1048576).toFixed(1) + ' MB' : (g.size / 1024).toFixed(0) + ' KB';
    const icon = CAT_ICONS[g.category] || '&#127918;';
    const tagsHtml = (g.tags || []).slice(0, 4).map(t => `<span class="card-tag">${t}</span>`).join('');
    
    card.innerHTML = `
      <div class="card-img">${icon}</div>
      <div class="card-body">
        <div class="card-title" title="${escHtml(g.name)}">${escHtml(g.name)}</div>
        <div class="card-cat">${icon} ${g.category}</div>
        <div class="card-desc">${escHtml(g.description)}</div>
        <div class="card-meta">${tagsHtml}</div>
      </div>
      <div class="card-footer">
        <button class="btn btn-play" onclick="playGame('${g.slug}',event)">&#9654; Play</button>
        <button class="btn btn-blank" onclick="openAboutBlank('${g.slug}',event)" title="Open in stealth tab">&#128279; Stealth</button>
        <span class="btn-size">${sizeStr}</span>
      </div>`;
    fragment.appendChild(card);
  }
  
  grid.appendChild(fragment);
  displayedCount = end;
  count.innerHTML = `Showing <b>${displayedCount}</b> of <b>${filtered.length}</b> games`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Format file size ───
function fmtSize(bytes) {
  if (bytes > 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1024).toFixed(0) + ' KB';
}

// ─── Get game CDN URL ───
function getGameUrl(slug) {
  const game = allGames.find(g => g.slug === slug);
  if (!game) return null;
  return CDN_BASE + '/' + game.file;
}

// ─── Play in modal ───
window.playGame = function(slug, event) {
  if (event) event.stopPropagation();
  const game = allGames.find(g => g.slug === slug);
  if (!game) return;
  currentGame = game;
  
  const url = getGameUrl(slug);
  document.getElementById('modal-title').textContent = game.name + ' - ' + game.category;
  document.getElementById('game-frame').src = url;
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
};

// ─── Open in about:blank (stealth) ───
window.openAboutBlank = function(slug, event) {
  if (event) event.stopPropagation();
  const game = allGames.find(g => g.slug === slug);
  if (!game) return;
  
  const url = getGameUrl(slug);
  const win = window.open('about:blank', '_blank');
  if (!win) { alert('Pop-up blocked! Please allow pop-ups for this site.'); return; }
  
  win.document.open();
  win.document.write(`<!DOCTYPE html><html><head><title>${escHtml(game.name)}</title><style>*{margin:0;padding:0}html,body{height:100%;overflow:hidden}iframe{width:100%;height:100%;border:none}</style></head><body><iframe src="${escHtml(url)}" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-pointer-lock" allowfullscreen></iframe></body></html>`);
  win.document.close();
};

// ─── Close modal ───
function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.getElementById('game-frame').src = '';
  document.body.style.overflow = '';
  currentGame = null;
}
document.getElementById('modal-close').onclick = closeModal;
document.getElementById('modal').onclick = function(e) {
  if (e.target === this) closeModal();
};

// ─── Modal actions ───
document.getElementById('btn-about-blank').onclick = function() {
  if (currentGame) openAboutBlank(currentGame.slug);
};
document.getElementById('btn-fullscreen').onclick = function() {
  const frame = document.getElementById('game-frame');
  if (frame.requestFullscreen) frame.requestFullscreen();
  else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
};
document.getElementById('btn-new-tab').onclick = function() {
  if (currentGame) window.open(getGameUrl(currentGame.slug), '_blank');
};

// ─── View toggle ───
window.setView = function(view) {
  currentView = view;
  const grid = document.getElementById('game-grid');
  grid.classList.toggle('list-view', view === 'list');
  document.getElementById('grid-view-btn').classList.toggle('active', view === 'grid');
  document.getElementById('list-view-btn').classList.toggle('active', view === 'list');
};

// ─── Event listeners ───
let searchTimeout;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(applyFilters, 200);
});

document.getElementById('sort-select').addEventListener('change', function() {
  applySorting();
  displayedCount = 0;
  renderGames();
});

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    if (document.getElementById('modal').classList.contains('active')) {
      closeModal();
    } else {
      document.getElementById('search').blur();
    }
  }
});

// Infinite scroll
let scrollThrottle = false;
window.addEventListener('scroll', function() {
  if (scrollThrottle) return;
  scrollThrottle = true;
  requestAnimationFrame(function() {
    // Back to top button
    document.getElementById('back-top').classList.toggle('visible', window.scrollY > 500);
    // Lazy load more games
    if (displayedCount < filtered.length && window.innerHeight + window.scrollY >= document.body.offsetHeight - 600) {
      renderGames();
    }
    scrollThrottle = false;
  });
});

// ─── Init ───
init();

})();
</script>
</body>
</html>
