<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas><div class="info-overlay" id="loading"><div id="spinner"></div><div id="status">Downloading...</div><div><progress value="0" max="100" id="progress" hidden=1></progress></div></div><div class="info-overlay" id="select-version"><a href="#" id="load">Load</a><br/>
~9mb
</div><script type='text/javascript'>
var loadScript = (ev, src) => {
ev.preventDefault();
// Hide select-version, show loader
document.getElementById('select-version').style.display = 'none';
document.getElementById('loading').style.display = 'block';
// Load the requested script
var s = document.createElement('script');
s.setAttribute('src', src);
document.head.appendChild(s);
};
document.getElementById('select-version').style.display = 'block';
document.getElementById('load').addEventListener('click', (ev) => loadScript(ev, 'index.js'));
var statusElement = document.getElementById('status');
var progressElement = document.getElementById('progress');
var spinnerElement = document.getElementById('spinner');
var Module = {
preRun: [],
postRun: [],
print: function(text) {
if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
console.log(text);
},
canvas: document.getElementById('canvas'),
setStatus: (text) => {
if (!Module.setStatus.last) {
Module.setStatus.last = { time: Date.now(), text: '' };
}
if (text === Module.setStatus.last.text) {
return;
}
var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
var now = Date.now();
if (m && now - Module.setStatus.last.time < 30) {
return; // if this is a progress update, skip it if too soon
}
Module.setStatus.last.time = now;
Module.setStatus.last.text = text;
if (m) {
text = m[1];
progressElement.value = parseInt(m[2])*100;
progressElement.max = parseInt(m[4])*100;
progressElement.hidden = false;
spinnerElement.hidden = false;
} else {
progressElement.value = null;
progressElement.max = null;
progressElement.hidden = true;
if (!text) {
spinnerElement.hidden = true;
document.getElementById('loading').style.display = 'none';
}
}
statusElement.innerHTML = text;
},
totalDependencies: 0,
monitorRunDependencies: (left) => {
Module.totalDependencies = Math.max(Module.totalDependencies, left);
Module.setStatus(left ? 'preparing... (' + (Module.totalDependencies-left) + '/' + Module.totalDependencies + ')' : 'all downloads complete.');
}
};
Module.setStatus('downloading...');
window.onerror = () => {
Module.setStatus('Exception thrown, see JavaScript console');
document.getElementById('loading').style.display = 'block';
spinnerElement.style.display = 'none';
Module.setStatus = (text) => {
if (text) {
console.error('[post-exception status] ' + text);
}
};
};
</script></body></html>
